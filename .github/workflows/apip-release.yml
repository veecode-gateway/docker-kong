name: APIP Docker Release

# Builds a multi-arch Docker image for VeeCode APIP (RHEL 10)
# and pushes it to Docker Hub.
#
# Triggered by:
#   - repository_dispatch from the kong repo after RPMs are published
#   - workflow_dispatch for manual builds

on:
  repository_dispatch:
    types: [apip-release]
  workflow_dispatch:
    inputs:
      kong_version:
        description: "Kong version (e.g. 3.10.0)"
        required: true
        type: string
      release_tag:
        description: "Kong repo release tag (e.g. v3.10.0)"
        required: true
        type: string
      kong_repo:
        description: "Kong GitHub repo (owner/repo)"
        required: true
        type: string
      official:
        description: "Tag as latest?"
        required: true
        type: boolean
        default: false

env:
  DOCKER_REPOSITORY: veecode/kong

jobs:
  build-and-push:
    name: Build & Push Multi-Arch Image
    runs-on: ubuntu-24.04

    steps:
      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "kong-version=${{ github.event.client_payload.kong_version }}" >> "$GITHUB_OUTPUT"
            echo "release-tag=${{ github.event.client_payload.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "kong-repo=${{ github.event.client_payload.kong_repo }}" >> "$GITHUB_OUTPUT"
            echo "official=${{ github.event.client_payload.official }}" >> "$GITHUB_OUTPUT"
          else
            echo "kong-version=${{ inputs.kong_version }}" >> "$GITHUB_OUTPUT"
            echo "release-tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "kong-repo=${{ inputs.kong_repo }}" >> "$GITHUB_OUTPUT"
            echo "official=${{ inputs.official }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - name: Download RPMs from Kong release
        env:
          GH_TOKEN: ${{ secrets.KONG_RELEASE_PAT }}
        run: |
          VERSION="${{ steps.vars.outputs.kong-version }}"
          TAG="${{ steps.vars.outputs.release-tag }}"
          REPO="${{ steps.vars.outputs.kong-repo }}"

          echo "Downloading RPMs from ${REPO} release ${TAG}"
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern "kong-${VERSION}.el10.*.rpm" \
            --dir .

          echo "### Downloaded artifacts" >> "$GITHUB_STEP_SUMMARY"
          ls -lh kong-*.rpm | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@53851d14592bedcffcf25ea515637cff71ef929a # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3

      - name: Login to Docker Hub
        uses: docker/login-action@e92390c5fb421da1463c202d546fed0ec5c39f20 # v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5
        with:
          images: ${{ env.DOCKER_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.kong-version }}
            type=raw,value=latest,enable=${{ steps.vars.outputs.official == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile.rhel10
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            KONG_VERSION=${{ steps.vars.outputs.kong-version }}

      - name: Summary
        run: |
          VERSION="${{ steps.vars.outputs.kong-version }}"
          echo "### Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.DOCKER_REPOSITORY }}:${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.vars.outputs.official }}" = "true" ]; then
            echo "- \`${{ env.DOCKER_REPOSITORY }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          fi
